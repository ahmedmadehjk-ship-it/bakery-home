<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>لوحة التحكم — Bakary Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c8960c; --gold-light: #e8b84b; --gold-shine: #f5d78e;
      --brown: #3d2000; --brown-mid: #6b3a00; --brown-pale: #fdf5e6;
      --green: #2e7d32; --red: #c62828; --white: #fff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Cairo', sans-serif; background: #f5ede0; color: var(--brown); direction: rtl; min-height: 100vh; }
    a { text-decoration: none; color: inherit; }

    /* LOGIN */
    #loginScreen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #3d2000, #7a5c00);
    }
    .login-box {
      background: var(--white); border-radius: 24px; padding: 52px 44px;
      width: 380px; text-align: center; box-shadow: 0 24px 60px rgba(0,0,0,.35);
    }
    .login-box .ico { font-size: 3.8rem; margin-bottom: 10px; }
    .login-box h1 { font-size: 1.6rem; font-weight: 800; color: var(--brown); margin-bottom: 4px; }
    .login-box p  { color: #999; font-size: .88rem; margin-bottom: 28px; }
    .login-box input {
      width: 100%; padding: 14px 18px; border: 2px solid #e0cdb8; border-radius: 12px;
      font-family: 'Cairo', sans-serif; font-size: 1rem; text-align: center;
      letter-spacing: 5px; direction: ltr; margin-bottom: 14px; outline: none;
    }
    .login-box input:focus { border-color: var(--gold); }
    .login-box button {
      width: 100%; padding: 14px; background: linear-gradient(135deg, var(--gold), #7a5c00);
      color: var(--white); border: none; border-radius: 12px;
      font-family: 'Cairo', sans-serif; font-size: 1.05rem; font-weight: 700; cursor: pointer;
    }
    .login-error { color: var(--red); font-size: .86rem; margin-top: 12px; display: none; }

    /* DASHBOARD */
    #dashboard { display: none; }
    .topbar {
      background: var(--brown); display: flex; align-items: center;
      justify-content: space-between; padding: 16px 32px; color: var(--gold-shine);
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand .ico { font-size: 2rem; }
    .brand h1 { font-size: 1.15rem; font-weight: 800; color: var(--white); }
    .brand p  { font-size: .74rem; opacity: .65; }
    .topbar-actions { display: flex; gap: 10px; align-items: center; }
    .topbar-btn {
      background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
      color: var(--white); padding: 8px 18px; border-radius: 8px; cursor: pointer;
      font-family: 'Cairo', sans-serif; font-size: .88rem; font-weight: 600;
    }
    .topbar-btn:hover { background: rgba(255,255,255,.2); }

    .main { padding: 28px 32px; max-width: 1200px; margin: 0 auto; }

    /* STATS */
    .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 18px; margin-bottom: 32px; }
    .stat {
      background: var(--white); border-radius: 16px; padding: 22px 18px;
      text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,.07); border-top: 4px solid var(--gold);
    }
    .stat .ico { font-size: 1.9rem; margin-bottom: 8px; }
    .stat .num { font-size: 2.2rem; font-weight: 800; color: var(--brown); }
    .stat .lbl { font-size: .82rem; color: #999; margin-top: 4px; }

    /* FILTERS */
    .filters {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 20px; flex-wrap: wrap;
    }
    .filter-btn {
      padding: 8px 20px; border-radius: 30px; border: 2px solid #e0cdb8;
      background: var(--white); cursor: pointer; font-family: 'Cairo', sans-serif;
      font-size: .88rem; font-weight: 600; color: var(--brown); transition: .2s;
    }
    .filter-btn.active { background: var(--brown); color: var(--white); border-color: var(--brown); }
    .search-input {
      padding: 9px 16px; border: 2px solid #e0cdb8; border-radius: 30px;
      font-family: 'Cairo', sans-serif; font-size: .9rem; outline: none;
      margin-right: auto; width: 240px; direction: rtl;
    }
    .search-input:focus { border-color: var(--gold); }

    /* TABLE */
    .sec-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .sec-header h2 { font-size: 1.1rem; font-weight: 800; }
    .refresh-btn {
      background: var(--brown-pale); border: 2px solid var(--gold-light);
      border-radius: 9px; padding: 8px 18px; cursor: pointer;
      font-family: 'Cairo', sans-serif; font-weight: 700; font-size: .86rem; color: var(--brown);
    }
    .refresh-btn:hover { background: var(--gold-light); }

    .table-wrap {
      background: var(--white); border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,.07); overflow: hidden; overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; min-width: 750px; }
    thead { background: var(--brown); color: var(--gold-shine); }
    th { padding: 14px 16px; text-align: right; font-size: .84rem; font-weight: 700; }
    td { padding: 13px 16px; font-size: .9rem; border-bottom: 1px solid #f0e8de; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fdf8f2; }
    .msg-text { color: #777; font-size: .84rem; max-width: 220px; line-height: 1.5; }

    /* STATUS BADGE */
    .status-badge {
      display: inline-block; padding: 4px 12px; border-radius: 20px;
      font-size: .78rem; font-weight: 700; white-space: nowrap;
    }
    .status-جديد    { background: #e3f2fd; color: #1565c0; }
    .status-قيد-التنفيذ { background: #fff8e1; color: #f57f17; }
    .status-تم-التسليم  { background: #e8f5e9; color: #2e7d32; }
    .status-ملغي   { background: #fdecea; color: #c62828; }

    /* ACTION BUTTONS */
    .actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .act-btn {
      padding: 5px 12px; border-radius: 7px; border: none; cursor: pointer;
      font-family: 'Cairo', sans-serif; font-size: .78rem; font-weight: 700; transition: .15s;
    }
    .act-btn:hover { opacity: .85; transform: scale(1.05); }
    .btn-process { background: #fff8e1; color: #f57f17; }
    .btn-done    { background: #e8f5e9; color: #2e7d32; }
    .btn-cancel  { background: #fdecea; color: #c62828; }
    .btn-delete  { background: #f5f5f5; color: #666; }

    .empty { text-align: center; padding: 60px; color: #bbb; }
    .empty span { font-size: 3rem; display: block; margin-bottom: 12px; }

    /* NOTIFICATION */
    .notif {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: var(--brown); color: var(--white); padding: 14px 28px;
      border-radius: 12px; font-weight: 700; font-size: .95rem;
      box-shadow: 0 8px 24px rgba(0,0,0,.25); z-index: 9999;
      opacity: 0; transition: opacity .3s; pointer-events: none;
    }
    .notif.show { opacity: 1; }

    @media(max-width:768px) {
      .stats { grid-template-columns: repeat(2,1fr); }
      .main { padding: 16px; }
      .topbar { padding: 12px 16px; }
      .search-input { width: 100%; margin-right: 0; }
    }
  </style>
</head>
<body>

<div class="notif" id="notif"></div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="ico">🔐</div>
    <h1>لوحة التحكم</h1>
    <p>Bakary Home · الدخول للإدارة فقط</p>
    <input type="password" id="pwdInput" placeholder="كلمة السر"/>
    <button onclick="login()">دخول ←</button>
    <div class="login-error" id="loginErr">❌ كلمة السر غلط</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <div class="brand">
      <span class="ico">🍰</span>
      <div><h1>Bakary Home</h1><p>لوحة تحكم الإدارة</p></div>
    </div>
    <div class="topbar-actions">
      <a href="/" target="_blank" class="topbar-btn">🌐 الموقع</a>
      <button class="topbar-btn" onclick="logout()">خروج ↩</button>
    </div>
  </div>

  <div class="main">

    <!-- STATS -->
    <div class="stats">
      <div class="stat"><div class="ico">📨</div><div class="num" id="sTotal">0</div><div class="lbl">إجمالي الطلبات</div></div>
      <div class="stat"><div class="ico">🆕</div><div class="num" id="sNew">0</div><div class="lbl">طلبات جديدة</div></div>
      <div class="stat"><div class="ico">⚙️</div><div class="num" id="sProcess">0</div><div class="lbl">قيد التنفيذ</div></div>
      <div class="stat"><div class="ico">✅</div><div class="num" id="sDone">0</div><div class="lbl">تم التسليم</div></div>
    </div>

    <!-- FILTERS + SEARCH -->
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">الكل</button>
      <button class="filter-btn" onclick="setFilter('جديد', this)">🆕 جديد</button>
      <button class="filter-btn" onclick="setFilter('قيد-التنفيذ', this)">⚙️ قيد التنفيذ</button>
      <button class="filter-btn" onclick="setFilter('تم-التسليم', this)">✅ تم التسليم</button>
      <button class="filter-btn" onclick="setFilter('ملغي', this)">❌ ملغي</button>
      <input type="text" class="search-input" id="searchInput" placeholder="🔍 ابحث بالاسم أو الهاتف..." oninput="renderTable()"/>
    </div>

    <!-- TABLE -->
    <div class="sec-header">
      <h2>📬 الطلبات الواردة</h2>
      <button class="refresh-btn" onclick="loadOrders()">🔄 تحديث</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>التاريخ</th>
            <th>الاسم</th>
            <th>الهاتف</th>
            <th>نوع الطلب</th>
            <th>التفاصيل</th>
            <th>الحالة</th>
            <th>إجراءات</th>
          </tr>
        </thead>
        <tbody id="ordersTbody"></tbody>
      </table>
    </div>

  </div>
</div>

<script>
const ADMIN_PASS = 'bakery2025';
let allOrders = [];
let currentFilter = 'all';

// ===== LOGIN =====
function login() {
  const pwd = document.getElementById('pwdInput').value;
  if (pwd === ADMIN_PASS) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadOrders();
  } else {
    document.getElementById('loginErr').style.display = 'block';
    document.getElementById('pwdInput').value = '';
  }
}
function logout() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('pwdInput').value = '';
  document.getElementById('loginErr').style.display = 'none';
}
document.getElementById('pwdInput').addEventListener('keydown', e => { if(e.key==='Enter') login(); });

// ===== LOAD ORDERS =====
async function loadOrders() {
  try {
    const res = await fetch('/api/orders');
    allOrders = await res.json();
    allOrders = allOrders.reverse(); // أحدث الطلبات أول
    updateStats();
    renderTable();
  } catch(e) {
    showNotif('❌ تأكد إن السيرفر شغال (node server.js)');
  }
}

// ===== STATS =====
function updateStats() {
  document.getElementById('sTotal').textContent   = allOrders.length;
  document.getElementById('sNew').textContent     = allOrders.filter(o => o.status === 'جديد').length;
  document.getElementById('sProcess').textContent = allOrders.filter(o => o.status === 'قيد التنفيذ').length;
  document.getElementById('sDone').textContent    = allOrders.filter(o => o.status === 'تم التسليم').length;
}

// ===== FILTER =====
function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

// ===== RENDER TABLE =====
function renderTable() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  let orders = allOrders;

  if (currentFilter !== 'all') {
    const filterMap = { 'جديد': 'جديد', 'قيد-التنفيذ': 'قيد التنفيذ', 'تم-التسليم': 'تم التسليم', 'ملغي': 'ملغي' };
    orders = orders.filter(o => o.status === filterMap[currentFilter]);
  }
  if (search) {
    orders = orders.filter(o =>
      (o.name||'').toLowerCase().includes(search) ||
      (o.phone||'').includes(search) ||
      (o.message||'').toLowerCase().includes(search)
    );
  }

  const tbody = document.getElementById('ordersTbody');
  if (!orders.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty"><span>📭</span>مفيش طلبات هنا</div></td></tr>`;
    return;
  }

  tbody.innerHTML = orders.map((o, i) => {
    const statusClass = (o.status||'جديد').replace(/ /g, '-');
    return `
    <tr>
      <td><strong>${allOrders.length - allOrders.findIndex(x=>x.id===o.id)}</strong></td>
      <td style="font-size:.78rem;color:#aaa;white-space:nowrap">${o.date||'—'}</td>
      <td><strong>${o.name||'—'}</strong></td>
      <td dir="ltr" style="white-space:nowrap">${o.phone||'—'}</td>
      <td><span style="background:#f5ede0;padding:3px 10px;border-radius:20px;font-size:.8rem">${o.product||'—'}</span></td>
      <td class="msg-text">${o.message||'—'}</td>
      <td><span class="status-badge status-${statusClass}">${o.status||'جديد'}</span></td>
      <td>
        <div class="actions">
          <button class="act-btn btn-process" onclick="updateStatus(${o.id}, 'قيد التنفيذ')">⚙️ تنفيذ</button>
          <button class="act-btn btn-done"    onclick="updateStatus(${o.id}, 'تم التسليم')">✅ تسليم</button>
          <button class="act-btn btn-cancel"  onclick="updateStatus(${o.id}, 'ملغي')">❌ إلغاء</button>
          <button class="act-btn btn-delete"  onclick="deleteOrder(${o.id})">🗑️</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

// ===== UPDATE STATUS =====
async function updateStatus(id, status) {
  try {
    await fetch(`/api/orders/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    });
    showNotif(`✅ تم التحديث: ${status}`);
    loadOrders();
  } catch(e) { showNotif('❌ حصل خطأ'); }
}

// ===== DELETE =====
async function deleteOrder(id) {
  if (!confirm('هتحذف الطلب ده؟')) return;
  try {
    await fetch(`/api/orders/${id}`, { method: 'DELETE' });
    showNotif('🗑️ تم الحذف');
    loadOrders();
  } catch(e) { showNotif('❌ حصل خطأ'); }
}

// ===== NOTIFICATION =====
function showNotif(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg;
  n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 2500);
}

// Auto-refresh كل 30 ثانية
setInterval(() => {
  if (document.getElementById('dashboard').style.display !== 'none') loadOrders();
}, 30000);
</script>
</body>
</html>
